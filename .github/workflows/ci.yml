name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test (go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.22", "1.23"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Test (race)
        run: go test -race -count=1 ./...

      - name: Vet
        run: go vet ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  no-cgo:
    name: no-cgo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Build without CGO
        run: CGO_ENABLED=0 go build ./...

      - name: Ensure no cgo imports outside tests/vendor
        run: |
          if grep -R -n --include='*.go' --exclude='*_test.go' --exclude-dir='vendor' -E '^[[:space:]]*import[[:space:]]*"C"[[:space:]]*$|^[[:space:]]*"C"[[:space:]]*$' .; then
            echo "cgo import detected outside test/vendor files"
            exit 1
          fi
